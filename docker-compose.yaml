services:
  strapi:
    build: ./cms/.
    env_file:
      - ./cms/.env
    container_name: strapi
    restart: unless-stopped
    ports:
      - "1337:1337"
    volumes:

      # Persist uploaded media files
      - strapi-uploads:/app/public/uploads
    environment:
      NODE_ENV: production

      # Database configuration
      DATABASE_CLIENT: postgres
      DATABASE_HOST: strapi-postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: strapi
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi
      DATABASE_SSL: "false"

      # Secret keys for authentication and encryption
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${JWT_SECRET}

      # Public URL
      PUBLIC_URL: https://cms.yourdomain.com
    depends_on:
      strapi-postgres:
        condition: service_healthy

  strapi-postgres:
    image: postgres:16-alpine
    container_name: strapi-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - strapi-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: strapi
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U strapi" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  strapi-uploads:
  strapi-postgres-data: