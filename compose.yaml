services:
  cms:
    build: ./cms/.
    restart: unless-stopped
    ports:
      - "1337:1337"
    volumes:
      # Persist uploaded media files
      - cms-uploads:/app/public/uploads
    environment:
      NODE_ENV: production

      # Database configuration
      DATABASE_CLIENT: ${DB_CLIENT:-postgres}
      DATABASE_HOST: ${DB_HOST:-db}
      DATABASE_PORT: ${DB_PORT:-5432}
      DATABASE_NAME: ${DB_NAME}
      DATABASE_USERNAME: ${DB_USERNAME}
      DATABASE_PASSWORD: ${DB_PASSWORD}
      DATABASE_SSL: ${DB_SSL:-false}

      # Secret keys for authentication and encryption
      APP_KEYS: ${CMS_APP_KEYS}
      API_TOKEN_SALT: ${CMS_API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${CMS_ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${CMS_TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${CMS_JWT_SECRET}

      PUBLIC_URL: ${CMS_URL}
      CLIENT_URL: ${APP_URL}

    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: db
    restart: unless-stopped
    ports:
      - ${DB_PORT:-5432}:${DB_PORT:-5432}
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-cms}
      POSTGRES_USER: ${DB_USERNAME:-cms}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cms}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cms" ]
      interval: 10s
      timeout: 5s
      retries: 5
  app:
    build: ./frontend/.
    environment:
      NODE_ENV: production
    ports:
      - ${APP_PORT:-3000}:${APP_PORT:-3000}
volumes:
  cms-uploads:
  db-data: